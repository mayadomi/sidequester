services:
  db:
    # postgis/postgis does not publish ARM64 images; runs under AMD64 emulation on Apple/Windows ARM.
    # This is fine for local dev. On AMD64 servers (production) there is no emulation overhead.
    image: postgis/postgis:16-3.4
    container_name: tdu-postgres
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - tdu-pgdata:/var/lib/postgresql/data

volumes:
  tdu-pgdata: