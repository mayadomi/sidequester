services:
  db:
    # Multi-arch image (amd64 + arm64). Works on both Apple Silicon / Windows ARM dev machines and amd64 production servers.
    image: ghcr.io/baosystems/postgis:16-3.4
    container_name: tdu-postgres
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - tdu-pgdata:/var/lib/postgresql/data

volumes:
  tdu-pgdata: